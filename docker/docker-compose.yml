name: eole-me-trail-mapper-dev

services:
  trail-mapper:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: eole-me-trail-mapper-dev
    ports:
      - "3040:3000"
    volumes:
      - ../public:/app/public
      - ../server.py:/app/server.py
      - ../garmin_course_injector.py:/app/garmin_course_injector.py
    command: uvicorn server:app --host 0.0.0.0 --port 3000 --reload
    networks:
      - eole_shared_network

networks:
  eole_shared_network:
    name: ${DOCKER_NETWORK_NAME:-eole_shared_network}
    external: ${DOCKER_NETWORK_EXTERNAL:-false}
